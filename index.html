<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF Size Sorter</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>

<body>

<div class="app">

<header class="top-header">

<img src="assets/logo.png" class="logo">

<h1 class="title">PDF Label Size Sorter</h1>

</header>

<div class="main-card">

<section class="upload-box">

<label for="pdfUpload" id="dropZone" class="drop-zone">

<div class="upload-icon">📄</div>

<div class="upload-title">Drag & Drop PDF</div>

<div class="upload-sub">or click to browse file</div>

<input type="file" id="pdfUpload" accept="application/pdf">

<div id="fileName" class="file-name"></div>

</label>

</section>

<!-- MARKETPLACE BADGE -->

<section id="marketplaceSection" class="marketplace-section" style="display:none;">

<div class="marketplace-card">

<div class="marketplace-label">
Marketplace Detected
</div>

<img id="marketplaceLogo" class="marketplace-logo">

<div id="marketplaceName" class="marketplace-name"></div>

</div>

</section>

<section class="progress">

<div id="status">Waiting for file...</div>

<div class="progress-bar">
<div id="progressFill"></div>
</div>

</section>

<section class="summary">

<h2>Size Summary</h2>

<table id="summaryTable">

<thead>
<tr>
<th>Size</th>
<th>Count</th>
</tr>
</thead>

<tbody></tbody>

</table>

</section>

<section class="download">

<button id="downloadBtn" class="primary-btn" disabled>
Download Sorted PDF
</button>

<button id="downloadZipBtn" class="primary-btn" disabled>
Download Size Wise ZIP
</button>

</section>

</div>

</div>

<script src="app.js"></script>

<script>

/* ========= FILE UPLOAD HANDLING ========= */

const dropZone = document.getElementById("dropZone");
const uploadInput = document.getElementById("pdfUpload");
const fileNameDisplay = document.getElementById("fileName");

/* DRAG OVER */

dropZone.addEventListener("dragover",(e)=>{

e.preventDefault();
dropZone.classList.add("drag-active");

});

/* DRAG LEAVE */

dropZone.addEventListener("dragleave",()=>{

dropZone.classList.remove("drag-active");

});

/* DROP */

dropZone.addEventListener("drop",(e)=>{

e.preventDefault();
dropZone.classList.remove("drag-active");

const files = e.dataTransfer.files;

if(files.length){

const dt = new DataTransfer();
dt.items.add(files[0]);

uploadInput.files = dt.files;

showFileName(files[0].name);

uploadInput.dispatchEvent(new Event("change"));

}

});

/* FILE SELECT */

uploadInput.addEventListener("change",()=>{

if(uploadInput.files.length){

showFileName(uploadInput.files[0].name);

}

});

function showFileName(name){

fileNameDisplay.innerText = "Loaded File: " + name;

}

</script>

</body>
</html>

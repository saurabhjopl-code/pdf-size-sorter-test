<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF Size Sorter</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>

<body>

<div class="container">

<header>

<img src="assets/logo.png" class="logo">

<h1>PDF Label Size Sorter</h1>

</header>

<section class="upload-box">

<div id="dropZone" class="drop-zone">

<div class="upload-icon">📄</div>

<div class="upload-title">
Drag & Drop PDF File
</div>

<div class="upload-sub">
or click to browse
</div>

<input type="file" id="pdfUpload" accept="application/pdf">

<div id="fileName" class="file-name"></div>

</div>

<button id="processBtn">Process PDF</button>

</section>

<section class="progress">

<div id="status">Waiting for file...</div>

</section>

<section class="summary">

<h2>Size Summary</h2>

<table id="summaryTable">

<thead>
<tr>
<th>Size</th>
<th>Count</th>
</tr>
</thead>

<tbody></tbody>

</table>

</section>

<section class="download">

<button id="downloadBtn" disabled>Download Sorted PDF</button>

<button id="downloadZipBtn" disabled>
Download Size Wise ZIP
</button>

</section>

</div>

<script src="app.js"></script>

<script>

/* ===========================
   DRAG & DROP + FILE DISPLAY
   =========================== */

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("pdfUpload");
const fileNameDisplay = document.getElementById("fileName");

/* click upload */
dropZone.addEventListener("click", () => {
fileInput.click();
});

/* drag highlight */
dropZone.addEventListener("dragover", (e)=>{
e.preventDefault();
dropZone.classList.add("drag-active");
});

dropZone.addEventListener("dragleave", ()=>{
dropZone.classList.remove("drag-active");
});

/* drop file */
dropZone.addEventListener("drop", (e)=>{

e.preventDefault();
dropZone.classList.remove("drag-active");

const files = e.dataTransfer.files;

if(files.length){

fileInput.files = files;
showFileName(files[0].name);

}

});

/* normal upload */
fileInput.addEventListener("change", ()=>{

if(fileInput.files.length){

showFileName(fileInput.files[0].name);

}

});

/* show file name */

function showFileName(name){

fileNameDisplay.innerText = "Loaded File: " + name;

}

</script>

</body>
</html>

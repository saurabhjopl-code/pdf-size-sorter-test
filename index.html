<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF Size Sorter</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>

<body>

<div class="app">

<header class="top-header">

<img src="assets/logo.png" class="logo">

<h1 class="title">PDF Label Size Sorter</h1>

</header>

<div class="main-card">

<section class="upload-box">

<label for="pdfUpload" id="dropZone" class="drop-zone">

<div class="upload-icon">📄</div>

<div class="upload-title">
Drag & Drop PDF
</div>

<div class="upload-sub">
or click to browse file
</div>

<input type="file" id="pdfUpload" accept="application/pdf">

<div id="fileName" class="file-name"></div>

</label>

<button id="processBtn" class="primary-btn">
Process PDF
</button>

</section>

<section class="progress">

<div id="status">Waiting for file...</div>

</section>

<section class="summary">

<h2>Size Summary</h2>

<table id="summaryTable">

<thead>
<tr>
<th>Size</th>
<th>Count</th>
</tr>
</thead>

<tbody></tbody>

</table>

</section>

<section class="download">

<button id="downloadBtn" class="primary-btn" disabled>
Download Sorted PDF
</button>

<button id="downloadZipBtn" class="secondary-btn" disabled>
Download Size Wise ZIP
</button>

</section>

</div>

</div>

<script src="app.js"></script>

<script>

/* ===========================
   DRAG & DROP + FILE NAME
   =========================== */

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("pdfUpload");
const fileNameDisplay = document.getElementById("fileName");

/* DRAG OVER */

dropZone.addEventListener("dragover", function(e){

e.preventDefault();
dropZone.classList.add("drag-active");

});

/* DRAG LEAVE */

dropZone.addEventListener("dragleave", function(){

dropZone.classList.remove("drag-active");

});

/* DROP FILE */

dropZone.addEventListener("drop", function(e){

e.preventDefault();
dropZone.classList.remove("drag-active");

const files = e.dataTransfer.files;

if(files.length){

const dataTransfer = new DataTransfer();
dataTransfer.items.add(files[0]);

fileInput.files = dataTransfer.files;

showFileName(files[0].name);

}

});

/* NORMAL FILE SELECT */

fileInput.addEventListener("change", function(){

if(fileInput.files.length){

showFileName(fileInput.files[0].name);

}

});

/* SHOW FILE NAME */

function showFileName(name){

fileNameDisplay.innerText = "Loaded File: " + name;

}

</script>

</body>
</html>
